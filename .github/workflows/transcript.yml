name: Fetch Latest 3 Transcripts

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'YouTube Channel or Video URL'
        required: true
        default: 'https://www.youtube.com/@stockmarketcommando'

  push:
    branches: [ main ]
    paths:
      - 'transcript.py'
      - '.github/workflows/transcript.yml'

  schedule:
    - cron: '0 */5 * * *'   # runs every 5 hours

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install selenium webdriver-manager pymysql requests beautifulsoup4 lxml

      - name: Run Scraper
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          echo "Starting transcript script..."
          python transcript.py "${{ github.event.inputs.target_url || 'https://www.youtube.com/@stockmarketcommando' }}"
