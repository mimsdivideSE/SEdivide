name: Fetch Latest 3 Transcripts

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'YouTube Channel or Video URL'
        required: true
        default: 'https://www.youtube.com/@stockmarketcommando'

  push:
    branches: [ main ]
    paths:
      - 'transcript.py'
      - '.github/workflows/transcript.yml'

  schedule:
    - cron: '0 */5 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ---------------- INSTALL CHROME ---------------- #
      - name: Install Chrome & System Dependencies
        run: |
          sudo apt-get update

          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

          # ✅ FIXED PACKAGE LIST
          sudo apt-get install -y \
            fonts-liberation \
            libappindicator3-1 \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils

      # ---------------- PYTHON DEPENDENCIES ---------------- #
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            selenium \
            webdriver-manager \
            pymysql \
            requests \
            beautifulsoup4 \
            lxml \
            googletrans==4.0.0-rc1

      - name: Show Installed Packages
        run: pip list

      # ---------------- RUN SCRIPT ---------------- #
      - name: Run Scraper
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          echo "Starting transcript script..."
          python transcript.py "${{ github.event.inputs.target_url || 'https://www.youtube.com/@stockmarketcommando' }}"
