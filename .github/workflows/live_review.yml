name: Live Review Screenshot Bot

on:
  workflow_dispatch:

jobs:
  live-review-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ================= CHECKOUT ================= #
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON ================= #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ================= CHROME ================= #
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # ================= LINUX DEPENDENCIES ================= #
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            unzip \
            curl \
            xvfb \
            libxi6 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1

      # ================= PYTHON DEPENDENCIES ================= #
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager mysql-connector-python pandas gspread oauth2client

      # ================= VERIFY CHROME ================= #
      - name: Verify Chrome Installation
        run: |
          google-chrome --version

      # ================= PRECISION TIMING DELAY ================= #
      - name: Wait for Exact Market Milestone Minute
        run: |
          # Target minute execution setup (Always execution at exactly the 30th minute of the IST hour)
          TARGET_MINUTE=30
          
          while true; do
            CURRENT_MINUTE=$(date -u +%-M)
            CURRENT_SECOND=$(date -u +%-S)
            
            if [ "$CURRENT_MINUTE" -eq "$TARGET_MINUTE" ]; then
              echo "Target time reached! Executing pipeline..."
              break
            fi
            
            # Calculate seconds remaining to next check block dynamically
            echo "Current Minute: $CURRENT_MINUTE. Waiting for Minute: $TARGET_MINUTE..."
            sleep 10
          done

      # ================= RUN BOT ================= #
      - name: Run Live Review Bot
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
        run: |
          python live_review.py
