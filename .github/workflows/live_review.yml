
name: Live Review Screenshot Bot

on:

  workflow_dispatch:

  schedule:
    # 9 AM IST → 4 PM IST
    # UTC: 3:30 AM → 10:30 AM
    # GitHub Actions only supports full-hour cron reliably

    - cron: "0 4 * * *"   # 9:30 AM IST
    - cron: "0 5 * * *"   # 10:30 AM IST
    - cron: "0 6 * * *"   # 11:30 AM IST
    - cron: "0 7 * * *"   # 12:30 PM IST
    - cron: "0 8 * * *"   # 1:30 PM IST
    - cron: "0 9 * * *"   # 2:30 PM IST
    - cron: "0 10 * * *"  # 3:30 PM IST
    - cron: "0 11 * * *"  # 4:30 PM IST

jobs:

  live-review-bot:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # ================= CHECKOUT ================= #

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON ================= #

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ================= CHROME ================= #

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1

      # ================= CHROMEDRIVER ================= #

      - name: Install ChromeDriver Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            wget \
            unzip \
            curl \
            xvfb \
            libxi6 \
            libgconf-2-4 \
            default-jdk

      # ================= PYTHON LIBRARIES ================= #

      - name: Install Python Dependencies
        run: |

          pip install --upgrade pip

          pip install selenium

          pip install webdriver-manager

          pip install mysql-connector-python

          pip install pandas

          pip install gspread

          pip install oauth2client

      # ================= VERIFY CHROME ================= #

      - name: Verify Chrome Installation
        run: |
          google-chrome --version

      # ================= RUN BOT ================= #

      - name: Run Live Review Bot

        env:

          DB_HOST: ${{ secrets.DB_HOST }}

          DB_USER: ${{ secrets.DB_USER }}

          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

          DB_NAME: ${{ secrets.DB_NAME }}

          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}

          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}

        run: |

          python live_review.py
