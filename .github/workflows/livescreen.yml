name: Live Screen Bot

on:
  workflow_dispatch:
  schedule:
    # 1. Triggers at 4:00 AM UTC (9:30 AM IST)
    - cron: "0 4 * * 1-5"
    
    # 2. Triggers every hour at the top of the hour from 10:30 AM IST to 3:30 PM IST
    # 5-10 UTC corresponds to 10:30, 11:30, 12:30, 1:30, 2:30, 3:30 PM IST
    - cron: "0 5-10 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install selenium webdriver-manager mysql-connector-python gspread pandas pytz

      - name: Run Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: python livescreen.py
