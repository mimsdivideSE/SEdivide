name: Live Screen Bot

on:
  workflow_dispatch:

  schedule:
    # Runs at the 30-minute mark of every hour from 3:30 AM UTC (9:30 AM IST) to 10:30 AM UTC (4:30 PM IST), Monday to Friday
    - cron: "30 3-10 * * 1-5"

concurrency:
  group: live-screen
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager mysql-connector-python gspread pandas pytz

      - name: Run Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: |
          echo "Starting Live Screen script..."
          python livescreen.py
