name: Live Screen Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "55 6 * * *"   # 12:25 PM IST every day

concurrency:
  group: live-screen
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      # ================= CHECKOUT ================= #
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON ================= #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ================= DEPENDENCIES ================= #
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager mysql-connector-python gspread pandas pytz

      # ================= RUN SCRIPT ================= #
      - name: Run Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: |
          echo "Starting Live Screen script..."
          python livescreen.py
