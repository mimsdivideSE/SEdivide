name: Live Screen Scraper

on:
  schedule:
    # Runs every hour at minute 0, from 3:00 UTC to 10:00 UTC (9:30 AM to 4:30 PM IST)
    # Adjust the hours below if your target market timezone is different!
    - cron: '0 3-10 * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the GitHub UI

jobs:
  scrape-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to speed up subsequent runs

      - name: Install Google Chrome Browser
        # Installs a stable, headless-compatible Chrome binary into the runner
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread pandas mysql-connector-python selenium webdriver-manager

      - name: Execute Scraper Script
        env:
          # Map GitHub Secrets to the Environment Variables expected by your script
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: python your_script_name.py
